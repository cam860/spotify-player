<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Record Player</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fce8ee;
      font-family: 'DM Sans', sans-serif;
    }
    .widget {
      width: 460px;
      background: #fff5f7;
      border-radius: 32px;
      padding: 36px 32px 28px;
      border: 1px solid #f7c5d0;
      color: #5c2d3a;
      user-select: none;
      box-shadow: 0 8px 40px #f4a7bc33;
    }
    .widget::before {
      content: '✦  ✦  ✦';
      display: block;
      text-align: center;
      font-size: 9px;
      color: #f4a7bc;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }
    .turntable {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 0 auto 30px;
    }
    .platter {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: #fde0e8;
      border: 1.5px solid #f4a7bc;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .platter.spinning { animation: spin 3s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .vinyl-grooves { position: absolute; width: 100%; height: 100%; border-radius: 50%; }
    .label-disc {
      width: 116px; height: 116px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f9a8c9, #e8607a);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; align-items: center; justify-content: center;
      z-index: 2; overflow: hidden;
      border: 2.5px solid #fff;
      box-shadow: 0 0 0 4px #f4a7bc55;
    }
    .label-disc img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .label-disc img.loaded { display: block; }
    .label-disc .sp-icon { font-size: 40px; color: #fff; }
    .label-disc .sp-icon.hidden { display: none; }
    .spindle {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; border: 1.5px solid #f4a7bc;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 3;
    }
    .tonearm { position: absolute; top: 14px; right: -14px; width: 120px; height: 120px; pointer-events: none; z-index: 10; }
    .track-info { text-align: center; margin-bottom: 20px; }
    .track-name {
      font-size: 18px; font-weight: 500; color: #5c2d3a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 380px; margin: 0 auto 6px;
    }
    .track-artist { font-size: 14px; color: #c47a8a; }
    .progress-bar { width: 100%; height: 3px; background: #fcd5de; border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: #e8607a; border-radius: 2px; width: 0%; transition: width 1s linear; }
    .time-row { display: flex; justify-content: space-between; font-size: 12px; color: #c47a8a; margin-bottom: 24px; }
    .controls { display: flex; align-items: center; justify-content: center; gap: 26px; margin-bottom: 22px; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer; color: #c47a8a;
      padding: 8px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .ctrl-btn:hover { color: #e8607a; background: #fde0e8; }
    .ctrl-btn.active { color: #e8607a; }
    .play-btn {
      width: 60px; height: 60px; border-radius: 50%;
      background: #e8607a; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff; transition: background 0.15s, transform 0.1s;
      box-shadow: 0 4px 18px #e8607a44;
    }
    .play-btn:hover { background: #d44d66; transform: scale(1.05); }
    .play-btn:active { transform: scale(0.97); }
    .volume-row { display: flex; align-items: center; gap: 12px; padding: 0 2px; }
    .volume-row i { color: #c47a8a; font-size: 17px; }
    input[type=range] { flex: 1; height: 3px; accent-color: #e8607a; cursor: pointer; }
    .connect-btn {
      display: block; width: 100%; margin-top: 20px;
      background: #e8607a; color: #fff; border: none;
      border-radius: 20px; padding: 13px 0;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
      box-shadow: 0 4px 14px #e8607a33;
      letter-spacing: 0.3px;
    }
    .connect-btn:hover { background: #d44d66; }
    .status-label { font-size: 11px; color: #c47a8a; text-align: center; margin-top: 10px; }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #fcd5de; margin-right: 6px; vertical-align: middle; }
    .status-dot.connected { background: #e8607a; }
    @media (prefers-reduced-motion: reduce) { .platter.spinning { animation: none; } }
  </style>
</head>
<body>
<div class="widget">
  <div class="turntable">
    <div class="platter" id="platter">
      <svg class="vinyl-grooves" viewBox="0 0 320 320" aria-hidden="true">
        <circle cx="160" cy="160" r="152" fill="none" stroke="#f9c5d0" stroke-width="1"/>
        <circle cx="160" cy="160" r="141" fill="none" stroke="#fad0d8" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="129" fill="none" stroke="#f9c5d0" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="117" fill="none" stroke="#fad0d8" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="105" fill="none" stroke="#f9c5d0" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="93"  fill="none" stroke="#fad0d8" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="81"  fill="none" stroke="#f9c5d0" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="69"  fill="none" stroke="#fad0d8" stroke-width="0.8"/>
      </svg>
      <div class="label-disc">
        <img id="albumArt" alt="album artwork" />
        <i class="ti ti-brand-spotify sp-icon" id="spIcon" aria-hidden="true"></i>
      </div>
      <div class="spindle" aria-hidden="true"></div>
    </div>
    <svg class="tonearm" viewBox="0 0 90 90" aria-hidden="true" overflow="visible">
      <g id="tonearmGroup" style="transform-origin: 78px 12px; transform: rotate(0deg); transition: transform 0.6s ease;">
        <circle cx="78" cy="12" r="6" fill="#fde0e8" stroke="#f4a7bc" stroke-width="1"/>
        <circle cx="78" cy="12" r="3" fill="#f4a7bc"/>
        <line x1="78" y1="12" x2="20" y2="75" stroke="#f4a7bc" stroke-width="2" stroke-linecap="round"/>
        <rect x="14" y="72" width="10" height="5" rx="2" fill="#fde0e8" stroke="#f4a7bc" stroke-width="0.5"/>
        <circle cx="12" cy="74.5" r="2.5" fill="#e8607a"/>
      </g>
    </svg>
  </div>

  <div class="track-info">
    <div class="track-name" id="trackName">Not connected</div>
    <div class="track-artist" id="trackArtist">Connect Spotify to play</div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="time-row">
    <span id="currentTime">0:00</span>
    <span id="totalTime">0:00</span>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="shuffleBtn" aria-label="Toggle shuffle">
      <i class="ti ti-arrows-shuffle" style="font-size:20px" aria-hidden="true"></i>
    </button>
    <button class="ctrl-btn" id="prevBtn" aria-label="Previous track">
      <i class="ti ti-player-skip-back" style="font-size:26px" aria-hidden="true"></i>
    </button>
    <button class="play-btn" id="playBtn" aria-label="Play">
      <i class="ti ti-player-play" style="font-size:26px" id="playIcon" aria-hidden="true"></i>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="Next track">
      <i class="ti ti-player-skip-forward" style="font-size:26px" aria-hidden="true"></i>
    </button>
    <button class="ctrl-btn" id="repeatBtn" aria-label="Toggle repeat">
      <i class="ti ti-repeat" style="font-size:20px" aria-hidden="true"></i>
    </button>
  </div>
  <div class="volume-row">
    <i class="ti ti-volume" aria-hidden="true"></i>
    <input type="range" id="volSlider" min="0" max="100" value="70" step="1" aria-label="Volume">
    <i class="ti ti-volume-2" aria-hidden="true"></i>
  </div>
  <button class="connect-btn" id="connectBtn">Connect to Spotify</button>
  <p class="status-label">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Not connected</span>
  </p>
</div>

<script>
  const CLIENT_ID    = '03b5ecc16775418780be21ba5bbd61c6';
  const REDIRECT_URI = 'https://cam860.github.io/spotify-player/spotify-record-player-pink.html';
  const SCOPES = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';

  let token = null, isPlaying = false, isShuffle = false, isRepeat = false;
  let progressInterval = null, currentMs = 0, durationMs = 0;

  const platter      = document.getElementById('platter');
  const playBtn      = document.getElementById('playBtn');
  const playIcon     = document.getElementById('playIcon');
  const trackName    = document.getElementById('trackName');
  const trackArtist  = document.getElementById('trackArtist');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl= document.getElementById('currentTime');
  const totalTimeEl  = document.getElementById('totalTime');
  const connectBtn   = document.getElementById('connectBtn');
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const shuffleBtn   = document.getElementById('shuffleBtn');
  const repeatBtn    = document.getElementById('repeatBtn');
  const albumArt     = document.getElementById('albumArt');
  const spIcon       = document.getElementById('spIcon');
  const tonearmGroup = document.getElementById('tonearmGroup');

  function fmtMs(ms) { const s = Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
  function setTonearm(p) { tonearmGroup.style.transform = p ? 'rotate(-18deg)' : 'rotate(0deg)'; }
  function setSpinning(v) { platter.classList.toggle('spinning', v); }
  function setConnected(v) {
    statusDot.className = 'status-dot' + (v ? ' connected' : '');
    statusText.textContent = v ? 'Connected' : 'Not connected';
    connectBtn.style.display = v ? 'none' : 'block';
  }
  function updateProgress() {
    if (durationMs > 0) {
      progressFill.style.width = Math.round((currentMs/durationMs)*100) + '%';
      currentTimeEl.textContent = fmtMs(currentMs);
    }
  }
  function updateTrack(data) {
    if (!data || !data.item) { trackName.textContent = 'Nothing playing'; trackArtist.textContent = ''; return; }
    const item = data.item;
    trackName.textContent   = item.name;
    trackArtist.textContent = item.artists.map(a => a.name).join(', ');
    durationMs = item.duration_ms; currentMs = data.progress_ms;
    totalTimeEl.textContent = fmtMs(durationMs);
    updateProgress();
    const art = item.album?.images?.[0]?.url;
    if (art) {
      albumArt.src = art;
      albumArt.onload  = () => { albumArt.classList.add('loaded');    spIcon.classList.add('hidden'); };
      albumArt.onerror = () => { albumArt.classList.remove('loaded'); spIcon.classList.remove('hidden'); };
    }
    isPlaying = data.is_playing;
    playIcon.className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';
    setSpinning(isPlaying); setTonearm(isPlaying);
  }
  async function apiFetch(endpoint, method='GET', body=null) {
    if (!token) return null;
    const opts = { method, headers: { 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    try {
      const r = await fetch('https://api.spotify.com/v1'+endpoint, opts);
      if (r.status===204||r.status===202) return {};
      if (r.status===401) { setConnected(false); token=null; return null; }
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }
  async function fetchPlayback() { const d = await apiFetch('/me/player'); if (d) updateTrack(d); }
  function startProgressTick() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => { if (isPlaying && currentMs < durationMs) { currentMs+=1000; updateProgress(); } }, 1000);
  }
  playBtn.addEventListener('click', async () => {
    if (!token) return;
    if (isPlaying) { await apiFetch('/me/player/pause','PUT'); isPlaying=false; }
    else           { await apiFetch('/me/player/play', 'PUT'); isPlaying=true;  }
    playIcon.className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';
    setSpinning(isPlaying); setTonearm(isPlaying); setTimeout(fetchPlayback, 400);
  });
  document.getElementById('nextBtn').addEventListener('click', async () => { if (!token) return; await apiFetch('/me/player/next','POST'); setTimeout(fetchPlayback,700); });
  document.getElementById('prevBtn').addEventListener('click', async () => { if (!token) return; await apiFetch('/me/player/previous','POST'); setTimeout(fetchPlayback,700); });
  shuffleBtn.addEventListener('click', async () => { if (!token) return; isShuffle=!isShuffle; await apiFetch(`/me/player/shuffle?state=${isShuffle}`,'PUT'); shuffleBtn.classList.toggle('active',isShuffle); });
  repeatBtn.addEventListener('click',  async () => { if (!token) return; isRepeat=!isRepeat; await apiFetch(`/me/player/repeat?state=${isRepeat?'track':'off'}`,'PUT'); repeatBtn.classList.toggle('active',isRepeat); });
  document.getElementById('volSlider').addEventListener('input', async (e) => { if (!token) return; await apiFetch(`/me/player/volume?volume_percent=${e.target.value}`,'PUT'); });

  function generateRandomString(len) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(len))).map(b => chars[b%chars.length]).join('');
  }
  async function generateCodeChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }
  connectBtn.addEventListener('click', async () => {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    window.location.href = `https://accounts.spotify.com/authorize`
      +`?client_id=${CLIENT_ID}`
      +`&response_type=code`
      +`&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
      +`&scope=${encodeURIComponent(SCOPES)}`
      +`&code_challenge_method=S256`
      +`&code_challenge=${challenge}`;
  });
  async function exchangeCodeForToken(code) {
    const verifier = sessionStorage.getItem('pkce_verifier');
    if (!verifier) return null;
    const body = new URLSearchParams({ client_id:CLIENT_ID, grant_type:'authorization_code', code, redirect_uri:REDIRECT_URI, code_verifier:verifier });
    const r = await fetch('https://accounts.spotify.com/api/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
    if (!r.ok) return null;
    sessionStorage.removeItem('pkce_verifier');
    return (await r.json()).access_token;
  }
  async function init() {
    const code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      window.history.replaceState(null,'',window.location.pathname);
      token = await exchangeCodeForToken(code);
      if (token) { setConnected(true); fetchPlayback(); startProgressTick(); setInterval(fetchPlayback,15000); }
    }
  }
  init();
</script>
</body>
</html>
