<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Record Player</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060606;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .widget {
      width: 320px;
      background: #0e0e0e;
      border-radius: 20px;
      padding: 28px 24px 22px;
      border: 0.5px solid #2a2a2a;
      color: #e8e8e8;
      user-select: none;
    }

    /* ── Turntable ── */
    .turntable {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
    }

    .platter {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #111;
      border: 1px solid #222;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .platter.spinning {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .vinyl-grooves {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
    }

    .label-disc {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #1db954;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      overflow: hidden;
    }

    .label-disc img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
    }
    .label-disc img.loaded { display: block; }
    .label-disc .sp-icon { font-size: 28px; color: #fff; }
    .label-disc .sp-icon.hidden { display: none; }

    .spindle {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #444;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .tonearm {
      position: absolute;
      top: 10px; right: -8px;
      width: 90px; height: 90px;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Track info ── */
    .track-info {
      text-align: center;
      margin-bottom: 18px;
    }

    .track-name {
      font-size: 15px;
      font-weight: 500;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
      margin: 0 auto 4px;
    }

    .track-artist {
      font-size: 12px;
      color: #888;
    }

    /* ── Progress ── */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: #1db954;
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #555;
      margin-bottom: 20px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 18px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .ctrl-btn:hover { color: #e8e8e8; background: #1a1a1a; }
    .ctrl-btn:focus-visible { outline: 2px solid #1db954; outline-offset: 2px; }
    .ctrl-btn.active { color: #1db954; }

    .play-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #1db954;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      transition: background 0.15s, transform 0.1s;
    }

    .play-btn:hover { background: #1ed760; transform: scale(1.05); }
    .play-btn:active { transform: scale(0.97); }
    .play-btn:focus-visible { outline: 2px solid #1ed760; outline-offset: 3px; }

    /* ── Volume ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 2px;
    }

    .volume-row i { color: #555; font-size: 16px; }

    input[type=range] {
      flex: 1;
      height: 3px;
      accent-color: #1db954;
      cursor: pointer;
    }

    /* ── Connect button ── */
    .connect-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      background: #1db954;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .connect-btn:hover { background: #1ed760; }
    .connect-btn:focus-visible { outline: 2px solid #1ed760; outline-offset: 2px; }

    /* ── Status ── */
    .status-label {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 10px;
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-dot.connected { background: #1db954; }

    @media (prefers-reduced-motion: reduce) {
      .platter.spinning { animation: none; }
    }
  </style>
</head>
<body>

<div class="widget" id="widget">
  <div class="turntable">
    <div class="platter" id="platter">
      <svg class="vinyl-grooves" viewBox="0 0 200 200" aria-hidden="true">
        <circle cx="100" cy="100" r="95" fill="none" stroke="#1a1a1a" stroke-width="1"/>
        <circle cx="100" cy="100" r="88" fill="none" stroke="#181818" stroke-width="0.8"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
        <circle cx="100" cy="100" r="72" fill="none" stroke="#181818" stroke-width="0.8"/>
        <circle cx="100" cy="100" r="64" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
        <circle cx="100" cy="100" r="56" fill="none" stroke="#181818" stroke-width="0.8"/>
        <circle cx="100" cy="100" r="48" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
        <circle cx="100" cy="100" r="40" fill="none" stroke="#181818" stroke-width="0.8"/>
      </svg>

      <div class="label-disc" id="labelDisc">
        <img id="albumArt" alt="album artwork" />
        <i class="ti ti-brand-spotify sp-icon" id="spIcon" aria-hidden="true"></i>
      </div>
      <div class="spindle" aria-hidden="true"></div>
    </div>

    <svg class="tonearm" viewBox="0 0 90 90" aria-hidden="true" overflow="visible">
      <g id="tonearmGroup" style="transform-origin: 78px 12px; transform: rotate(0deg); transition: transform 0.6s ease;">
        <circle cx="78" cy="12" r="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
        <circle cx="78" cy="12" r="3" fill="#333"/>
        <line x1="78" y1="12" x2="20" y2="75" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="14" y="72" width="10" height="5" rx="2" fill="#222" stroke="#333" stroke-width="0.5"/>
        <circle cx="12" cy="74.5" r="2.5" fill="#1db954"/>
      </g>
    </svg>
  </div>

  <div class="track-info">
    <div class="track-name" id="trackName">Not connected</div>
    <div class="track-artist" id="trackArtist">Connect Spotify to play</div>
  </div>

  <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="time-row">
    <span id="currentTime">0:00</span>
    <span id="totalTime">0:00</span>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="shuffleBtn" aria-label="Toggle shuffle" title="Shuffle">
      <i class="ti ti-arrows-shuffle" style="font-size:18px" aria-hidden="true"></i>
    </button>
    <button class="ctrl-btn" id="prevBtn" aria-label="Previous track">
      <i class="ti ti-player-skip-back" style="font-size:22px" aria-hidden="true"></i>
    </button>
    <button class="play-btn" id="playBtn" aria-label="Play">
      <i class="ti ti-player-play" style="font-size:20px" id="playIcon" aria-hidden="true"></i>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="Next track">
      <i class="ti ti-player-skip-forward" style="font-size:22px" aria-hidden="true"></i>
    </button>
    <button class="ctrl-btn" id="repeatBtn" aria-label="Toggle repeat" title="Repeat">
      <i class="ti ti-repeat" style="font-size:18px" aria-hidden="true"></i>
    </button>
  </div>

  <div class="volume-row">
    <i class="ti ti-volume" aria-hidden="true"></i>
    <input type="range" id="volSlider" min="0" max="100" value="70" step="1" aria-label="Volume">
    <i class="ti ti-volume-2" aria-hidden="true"></i>
  </div>

  <button class="connect-btn" id="connectBtn">Connect to Spotify</button>
  <p class="status-label">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Not connected</span>
  </p>
</div>

<script>
  // ── CONFIG — replace these two values ──────────────────────────────────────
  const CLIENT_ID    = '03b5ecc16775418780be21ba5bbd61c6';   // from developer.spotify.com
  const REDIRECT_URI = 'http://127.0.0.1:8888/spotify-record-player_9.html';
  // ──────────────────────────────────────────────────────────────────────────

  const SCOPES = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';

  let token = null;
  let isPlaying = false;
  let isShuffle = false;
  let isRepeat  = false;
  let progressInterval = null;
  let currentMs = 0;
  let durationMs = 0;

  const platter      = document.getElementById('platter');
  const playBtn      = document.getElementById('playBtn');
  const playIcon     = document.getElementById('playIcon');
  const trackName    = document.getElementById('trackName');
  const trackArtist  = document.getElementById('trackArtist');
  const progressFill = document.getElementById('progressFill');
  const progressBar  = document.getElementById('progressBar');
  const currentTimeEl= document.getElementById('currentTime');
  const totalTimeEl  = document.getElementById('totalTime');
  const connectBtn   = document.getElementById('connectBtn');
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const shuffleBtn   = document.getElementById('shuffleBtn');
  const repeatBtn    = document.getElementById('repeatBtn');
  const albumArt     = document.getElementById('albumArt');
  const spIcon       = document.getElementById('spIcon');
  const tonearmGroup = document.getElementById('tonearmGroup');

  function fmtMs(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }

  function setTonearm(playing) {
    tonearmGroup.style.transform = playing ? 'rotate(-18deg)' : 'rotate(0deg)';
  }

  function setSpinning(val) {
    platter.classList.toggle('spinning', val);
  }

  function setConnected(val) {
    statusDot.className = 'status-dot' + (val ? ' connected' : '');
    statusText.textContent = val ? 'Connected' : 'Not connected';
    connectBtn.style.display = val ? 'none' : 'block';
  }

  function updateProgress() {
    if (durationMs > 0) {
      const pct = Math.round((currentMs / durationMs) * 100);
      progressFill.style.width = pct + '%';
      progressBar.setAttribute('aria-valuenow', pct);
      currentTimeEl.textContent = fmtMs(currentMs);
    }
  }

  function updateTrack(data) {
    if (!data || !data.item) {
      trackName.textContent = 'Nothing playing';
      trackArtist.textContent = '';
      return;
    }
    const item = data.item;
    trackName.textContent   = item.name;
    trackArtist.textContent = item.artists.map(a => a.name).join(', ');
    durationMs = item.duration_ms;
    currentMs  = data.progress_ms;
    totalTimeEl.textContent = fmtMs(durationMs);
    updateProgress();

    const artUrl = item.album?.images?.[0]?.url;
    if (artUrl) {
      albumArt.src = artUrl;
      albumArt.onload  = () => { albumArt.classList.add('loaded');   spIcon.classList.add('hidden'); };
      albumArt.onerror = () => { albumArt.classList.remove('loaded'); spIcon.classList.remove('hidden'); };
    } else {
      albumArt.classList.remove('loaded');
      spIcon.classList.remove('hidden');
    }

    isPlaying = data.is_playing;
    playIcon.className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';
    playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
    setSpinning(isPlaying);
    setTonearm(isPlaying);
  }

  async function apiFetch(endpoint, method = 'GET', body = null) {
    if (!token) return null;
    const opts = {
      method,
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    try {
      const r = await fetch('https://api.spotify.com/v1' + endpoint, opts);
      if (r.status === 204 || r.status === 202) return {};
      if (r.status === 401) { setConnected(false); token = null; return null; }
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  async function fetchPlayback() {
    const data = await apiFetch('/me/player');
    if (data) updateTrack(data);
  }

  function startProgressTick() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (isPlaying && currentMs < durationMs) {
        currentMs += 1000;
        updateProgress();
      }
    }, 1000);
  }

  // ── Controls ──
  playBtn.addEventListener('click', async () => {
    if (!token) return;
    if (isPlaying) {
      await apiFetch('/me/player/pause', 'PUT');
      isPlaying = false;
    } else {
      await apiFetch('/me/player/play', 'PUT');
      isPlaying = true;
    }
    playIcon.className = isPlaying ? 'ti ti-player-pause' : 'ti ti-player-play';
    playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
    setSpinning(isPlaying);
    setTonearm(isPlaying);
    setTimeout(fetchPlayback, 400);
  });

  document.getElementById('nextBtn').addEventListener('click', async () => {
    if (!token) return;
    await apiFetch('/me/player/next', 'POST');
    setTimeout(fetchPlayback, 700);
  });

  document.getElementById('prevBtn').addEventListener('click', async () => {
    if (!token) return;
    await apiFetch('/me/player/previous', 'POST');
    setTimeout(fetchPlayback, 700);
  });

  shuffleBtn.addEventListener('click', async () => {
    if (!token) return;
    isShuffle = !isShuffle;
    await apiFetch(`/me/player/shuffle?state=${isShuffle}`, 'PUT');
    shuffleBtn.classList.toggle('active', isShuffle);
  });

  repeatBtn.addEventListener('click', async () => {
    if (!token) return;
    isRepeat = !isRepeat;
    await apiFetch(`/me/player/repeat?state=${isRepeat ? 'track' : 'off'}`, 'PUT');
    repeatBtn.classList.toggle('active', isRepeat);
  });

  document.getElementById('volSlider').addEventListener('input', async (e) => {
    if (!token) return;
    await apiFetch(`/me/player/volume?volume_percent=${e.target.value}`, 'PUT');
  });

  // ── PKCE helpers ──
  function generateRandomString(len) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(len)))
      .map(b => chars[b % chars.length]).join('');
  }

  async function generateCodeChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  // ── OAuth ──
  connectBtn.addEventListener('click', async () => {
    const verifier = generateRandomString(64);
    const challenge = await generateCodeChallenge(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);

    const url = `https://accounts.spotify.com/authorize`
      + `?client_id=${CLIENT_ID}`
      + `&response_type=code`
      + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
      + `&scope=${encodeURIComponent(SCOPES)}`
      + `&code_challenge_method=S256`
      + `&code_challenge=${challenge}`;
    window.location.href = url;
  });

  async function exchangeCodeForToken(code) {
    const verifier = sessionStorage.getItem('pkce_verifier');
    if (!verifier) return null;
    const body = new URLSearchParams({
      client_id:     CLIENT_ID,
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      code_verifier: verifier,
    });
    const r = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body,
    });
    if (!r.ok) return null;
    const data = await r.json();
    sessionStorage.removeItem('pkce_verifier');
    return data.access_token;
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      window.history.replaceState(null, '', window.location.pathname);
      token = await exchangeCodeForToken(code);
      if (token) {
        setConnected(true);
        fetchPlayback();
        startProgressTick();
        setInterval(fetchPlayback, 15000);
      }
    }
  }

  init();
</script>
</body>
</html>
